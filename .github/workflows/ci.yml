name: Run pytest selenium 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        suite:
            - tests/test_login.py
            - tests/apis/test_user_api.py


    steps:
    - name: Checkout source code from github
      uses: actions/checkout@v4
    - name: Install python 
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install necessary libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirement.txt

    - name: Install Chrome library
      uses: browser-actions/setup-chrome@v1

    - name: Create test report folder
      run: mkdir -p report

    - name: Run test
      #run: pytest -m smoke --html=report/report.html --self-contained-html
      #run: pytest ${{matrix.suite}} --maxfail=1 --disable-warnings -q
      run: |
        TEST_NAME=$(basename ${{ matrix.suite }} .py)
        pytest ${{matrix.suite}} \
          --maxfail=1 \
          --disable-warnings \
          --html=report/${TEST_NAME}.html \
          --self-contained-html
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with: 
        name: test-report -  ${{matrix.suite}}
        path: report/*.html
          