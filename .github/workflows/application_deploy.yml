
#CI Automation testing after deploying application to Dev, Staging, Prod...
name: Automation test - deploying application
run-name: Deploy ${{ github.event.action }} | ${{ github.ref_name }} | ${{ github.actor }}
on:
  repository_dispatch:
      types: [ run-dev-tests, run-staging-tests ]
jobs:
  automation_test_functions:
    uses: ./.github/workflows/automation_test.yml
    with:
      test_suite: '["tests/ui/functional/login_page"]'
      browser: '["Chrome","Edge"]'
      event: ${{ github.event.action }}

  automation_test_api:
    timeout-minutes: 8
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code from github
      uses: actions/checkout@v4

    - name: Install python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install necessary libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirement.txt

    - name: Set environment testing
      run: |
        if [[ "${{ github.event.action }}" == "run-dev-tests" ]]; then
          echo "BASE_API_URL=https://opensource-demo.orangehrmlive.com/web/index.php/api/v2/" >> $GITHUB_ENV
        elif [[ "${{ github.event.action }}" == "run-staging-tests" ]]; then
          echo "Staging"
        else
          echo "BASE_URL=http://mock" >> $GITHUB_ENV
        fi

    - name: Run Automation API tests
      run: |
        if [[ "${{ github.event.action }}" == "run-dev-tests" ]]; then
          pytest -m api_testing -s --maxfail=1 --disable-warnings 
        elif [[ "${{ github.event.action }}" == "run-staging-tests" ]]; then
          echo "STAGING: implementing test scripts for STAGING..."
        else
          echo "Mock" 
        fi