
#CI Automation testing after deploying application to Dev, Staging, Prod...
name: Run automation
run-name: Automation test after deploying application
on:
  repository_dispatch:
      types: [ run-dev-tests, run-staging-tests ]
jobs:
  automation_test_functions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - ./test/test_login.py
        browsers:
          - Chrome
          - Firefox

    steps:
    - name: Debug event
      run: |
        echo "Event name: ${{ github.event_name }}"
        echo "Event type: ${{ github.event.event_type }}"
        echo '${{ toJson(github.event) }}'

    - name: Checkout source code from github
      uses: actions/checkout@v4

    - name: Install python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install necessary libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirement.txt

    - name: Set environment testing
      run: |
          if [[ "${{ github.event.event_type }}" == "run-dev-tests" ]]; then
            echo "BASE_URL=https://opensource-demo.orangehrmlive.com" >> $GITHUB_ENV 
            echo "BASE_API_URL=https://jsonplaceholder.typicode.com" >> $GITHUB_ENV
          elif [[ "${{ github.event.action }}" == "run-staging-tests" ]]; then
            echo "Staging"
          else
            echo "BASE_URL=http://mock" >> $GITHUB_ENV
          fi
      env:
        browser: ${{ matrix.browsers }}

    - name: Run Automation tests
      run: |
        if [[ "${{ github.event.action }}" == "run-dev-tests" ]]; then
            pytest ${{matrix.suite}} --maxfail=1 --disable-warnings -q
          elif [[ "${{ github.event.action }}" == "run-staging-tests" ]]; then
            echo "STAGING: implementing test scripts for STAGING..."
          else
            echo "Mock" 
          fi 

  automation_test_api:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - ./test/apis
    steps:
    - name: Checkout source code from github
      uses: actions/checkout@v4

    - name: Install python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install necessary libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirement.txt

    - name: Set environment testing
      run: |
        if [[ "${{ github.event.action }}" == "run-dev-tests" ]]; then
          echo "BASE_API_URL=https://jsonplaceholder.typicode.com" >> $GITHUB_ENV
        elif [[ "${{ github.event.action }}" == "run-staging-tests" ]]; then
          echo "Staging"
        else
          echo "BASE_URL=http://mock" >> $GITHUB_ENV
        fi
    - name: Run Automation API tests
      run: |
        if [[ "${{ github.event.action }}" == "run-dev-tests" ]]; then
          pytest ${{matrix.suite}} --maxfail=1 --disable-warnings -q
        elif [[ "${{ github.event.action }}" == "run-staging-tests" ]]; then
          echo "STAGING: implementing test scripts for STAGING..."
        else
          echo "Mock" 
        fi